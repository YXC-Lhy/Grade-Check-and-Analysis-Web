<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成绩分析站 · 查询</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
      :root{
        --bg0:#eef5ff;
        --bg1:#f8fbff;

        --card:rgba(255,255,255,.86);
        --card2:rgba(255,255,255,.96);

        --line:#dbe7f4;

        --text:#24324a;
        --muted:#73839b;

        --soft:#f4f8fd;

        --brand:#409eff;
        --brand2:#66b1ff;

        --warn:#ffb74d;
        --danger:#f56c6c;

        --shadow:0 12px 36px rgba(24,74,135,.08);

        --radius:22px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
        color: var(--text);
        background:
radial-gradient(circle at 20% 0%,#dcefff 0%,transparent 45%),
radial-gradient(circle at 100% 0%,#eaf6ff 0%,transparent 40%),
linear-gradient(180deg,#f8fbff,#eef5fb);
      }

      body::before {
        content: "";
        position: fixed;
        inset: -40px;
        background: repeating-linear-gradient(
          135deg,
          rgba(64, 158, 255, 0.03) 0px,
          rgba(64, 158, 255, 0.03) 1px,
          transparent 1px,
          transparent 9px
        );
        opacity: 0.45;
        pointer-events: none;
        filter: blur(0.2px);
      }

      .wrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 22px 18px 34px;
        display: grid;
        gap: 16px;
      }

      .topbar {
        border-radius: var(--radius);
        background:
linear-gradient(
180deg,
rgba(255,255,255,.95),
rgba(248,251,255,.92)
);
        border: 1px solid #dce8f5;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        z-index:1000;
        transform: translateY(10px);
        opacity: 0;
        animation: in 760ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      @keyframes in {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .title {
        display: grid;
        gap: 4px;
      }

      .title h1 {
        font-family: "ZCOOL XiaoWei", serif;
        font-weight: 400;
        margin: 0;
        letter-spacing: 0.6px;
        font-size: 22px;
        line-height: 1.1;
      }

      .title p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .pill {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        background:#f5f9ff;
color:#5c6f88;
border:1px solid #dbe8f6;
        padding: 8px 10px;
        font-size: 12px;
        white-space: nowrap;
      }

      .btn {
        background:
linear-gradient(
180deg,
#5cabff,
#409eff
);
color:white;
border:none;
        padding: 10px 12px;
        border-radius: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, filter 160ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(110, 231, 255, 0.52);
        background:
linear-gradient(
180deg,
#6db8ff,
#53a8ff
);
box-shadow:
0 8px 24px rgba(64,158,255,.28);
        filter: saturate(1.06);
      }

      .btn:active {
        transform: translateY(0px);
      }

      .grid2 {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
      }

      @media (max-width: 980px) {
        .grid2 {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border-radius: var(--radius);
        background:
linear-gradient(
180deg,
rgba(255,255,255,.94),
rgba(250,252,255,.92)
);
        border: 1px solid #dfe9f5;
        backdrop-filter: blur(14px);
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(40,90,160,.08);
      }

      .panel-hd {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .panel-hd h2 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.3px;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.9);
      }

      .panel-bd {
        padding: 14px 16px 16px;
      }

      .control {
        display: grid;
        gap: 8px;
      }

      .control label {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.74);
      }

      .select,
      .input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid #dce6f2;
        background: white;
        color: var(--text);
        padding: 11px 12px;
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }

      .select:focus,
      .input:focus {
        border-color: #409eff;
        box-shadow: 0 0 0 4px 0 0 0 4px rgba(64,158,255,.15);
      }

      .combo {
        position: relative;
      }

      .menu {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgb(167 167 167 / 80%);
        backdrop-filter: blur(18px);
        z-index:9999;
        overflow: hidden;
        display: none;
        z-index: 40;
      }

      .menu.show {
        display: block;
      }

      .menu .item {
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .menu .item:last-child {
        border-bottom: none;
      }

      .menu .item:hover {
        background: rgba(110, 231, 255, 0.08);
      }

      .menu .main {
        font-weight: 700;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
      }

      .menu .sub {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.62);
        white-space: nowrap;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .table-wrap {
        overflow: auto;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: white;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        min-width: 1060px;
        font-variant-numeric: tabular-nums;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 5;
        background: #f4f8fd;
        backdrop-filter: blur(18px);
        color: #566a84;
        font-size: 12px;
        text-align: left;
        padding: 10px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }

      tbody td {
        padding: 9px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(0, 0, 0, 0.82);
        font-size: 13px;
        white-space: nowrap;
      }

      tbody tr:hover td {
        background: rgba(110, 231, 255, 0.045);
      }

      .cell-muted {
        color: rgba(0, 0, 0, 0.52);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(110, 231, 255, 0.95), rgba(78, 160, 255, 0.65));
        box-shadow: 0 0 0 3px rgba(110, 231, 255, 0.12);
      }

      .skeleton {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.16);
        overflow: hidden;
      }

      .pulse {
        height: 110px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
        background-size: 200% 100%;
        animation: shimmer 1.1s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 0% 0%;
        }
        100% {
          background-position: -200% 0%;
        }
      }

      .chartbox {
        height: 320px;
      }

      @media (max-width: 980px) {
        .chartbox {
          height: 300px;
        }
        table {
          min-width: 980px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="topline">
          <div class="title">
            <h1>成绩查询</h1>
            <p>选择学生后，按时间顺序展示历次成绩与段排名趋势</p>
          </div>
          <div class="actions">
            <div class="pill" id="currentStudent">未选择学生</div>
            <button class="btn" id="logoutBtn" type="button">退出登录</button>
          </div>
        </div>

        <div class="grid2">
          <div class="control combo">
            <label>学生搜索（座号 + 姓名）</label>
            <input class="input" id="studentInput" placeholder="例如：12 张三" autocomplete="off" />
            <div class="menu" id="studentMenu" role="listbox" aria-label="学生列表"></div>
            <div class="muted" id="metaHint">正在加载学生列表…</div>
          </div>
          
        </div>
      </div>

      <div class="panel">
        <div class="panel-hd">
          <h2>成绩单</h2>
          <div class="muted" id="tableHint"></div>
        </div>
        <div class="panel-bd">
          <div class="table-wrap" id="tableWrap"></div>
        </div>
      </div>

      <div class="grid2">
        <div class="panel">
          <div class="panel-hd">
            <h2>段排名趋势（按时间）</h2>
            <select class="select" id="trendMetric" style="max-width: 320px"></select>
            <div class="muted" id="trendHint"></div>
          </div>
          <div class="panel-bd">
            <div class="chartbox">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-hd">
            <h2>单次考试段排名对比（总分 + 各科）</h2>
            <select class="select" id="examPick" style="max-width: 320px"></select>
          </div>
          <div class="panel-bd">
            <div class="chartbox">
              <canvas id="singleChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const BASE_URL = "";
      const TOKEN_COOKIE = "token";

      const SUBJECTS = ["语文", "数学", "英语", "物理", "化学", "生物"];

      function getCookie(name) {
        const parts = document.cookie.split(";").map((x) => x.trim());
        for (const part of parts) {
          if (!part) continue;
          const idx = part.indexOf("=");
          if (idx < 0) continue;
          const k = decodeURIComponent(part.slice(0, idx));
          if (k !== name) continue;
          return decodeURIComponent(part.slice(idx + 1));
        }
        return "";
      }

      function eraseCookie(name) {
        document.cookie = `${encodeURIComponent(name)}=; Max-Age=0; Path=/; SameSite=Lax`;
      }

      function requireToken() {
        const token = getCookie(TOKEN_COOKIE);
        if (!token) {
          window.location.replace("/login.html");
          return "";
        }
        return token;
      }

      function setText(id, text) {
        const el = document.getElementById(id);
        if (el) el.textContent = text || "";
      }

      async function apiFetch(path, token) {
        const res = await fetch(`${BASE_URL}${path}`, {
          headers: token ? { Authorization: `Bearer ${token}` } : undefined,
        });
        if (res.status === 401) {
          eraseCookie(TOKEN_COOKIE);
          window.location.replace("/login.html");
          throw new Error("未登录");
        }
        if (!res.ok) {
          const detail = await res.json().catch(() => null);
          throw new Error(detail && detail.detail ? String(detail.detail) : `请求失败（${res.status}）`);
        }
        return res.json();
      }

      function fmt(v) {
        if (v === null || v === undefined || v === "") return "—";
        return String(v);
      }

      function niceStep(range) {
        if (!isFinite(range) || range <= 0) return 1;
        const rough = range / 7;
        const pow = Math.pow(10, Math.floor(Math.log10(rough)));
        const x = rough / pow;
        const base = x <= 1 ? 1 : x <= 2 ? 2 : x <= 5 ? 5 : 10;
        return base * pow;
      }

      function computeRankScale(values) {
        const nums = values.filter((x) => typeof x === "number" && isFinite(x));
        if (!nums.length) return { min: 1, max: 10, step: 1 };
        let minV = Math.min(...nums);
        let maxV = Math.max(...nums);
        if (minV === maxV) {
          minV = Math.max(1, minV - 2);
          maxV = maxV + 2;
        } else {
          const pad = Math.max(1, Math.ceil((maxV - minV) * 0.14));
          minV = Math.max(1, minV - pad);
          maxV = maxV + pad;
        }
        const step = niceStep(maxV - minV);
        return { min: minV, max: maxV, step };
      }

      function buildMetricOptions() {
        const sel = document.getElementById("trendMetric");
        sel.innerHTML = "";
        const items = ["总分", ...SUBJECTS];
        for (const it of items) {
          const opt = document.createElement("option");
          opt.value = it;
          opt.textContent = it;
          sel.appendChild(opt);
        }
        sel.value = "总分";
      }

      function metricGradeRank(exam, metricName) {
        if (metricName === "总分") return exam.total ? exam.total.grade_rank : null;
        if (!exam.subjects || !exam.subjects[metricName]) return null;
        return exam.subjects[metricName].grade_rank;
      }

      function metricClassRank(exam, metricName) {
        if (metricName === "总分") return exam.total ? exam.total.class_rank : null;
        if (!exam.subjects || !exam.subjects[metricName]) return null;
        return exam.subjects[metricName].class_rank;
      }

      function metricScore(exam, metricName) {
        if (metricName === "总分") return exam.total ? exam.total.score : null;
        if (!exam.subjects || !exam.subjects[metricName]) return null;
        return exam.subjects[metricName].score;
      }

      function buildTable(results) {
        if (!results || !Array.isArray(results.exams) || results.exams.length === 0) {
          return `<div class="muted">暂无数据</div>`;
        }

        let html = "";
        html += `<table>`;
        html += `<thead>`;
        html += `<tr>`;
        html += `<th>日期</th>`;
        html += `<th>考试</th>`;
        html += `<th>总分</th><th>总分班排</th><th>总分段排</th>`;
        for (const s of SUBJECTS) {
          html += `<th>${s}</th><th>${s}班排</th><th>${s}段排</th>`;
        }
        html += `</tr>`;
        html += `</thead>`;
        html += `<tbody>`;
        for (const ex of results.exams) {
          html += `<tr>`;
          html += `<td class="cell-muted">${fmt(ex.exam_date)}</td>`;
          html += `<td><span class="tag"><span class="dot"></span>${fmt(ex.exam_name)}</span></td>`;

          html += `<td>${fmt(metricScore(ex, "总分"))}</td>`;
          html += `<td>${fmt(metricClassRank(ex, "总分"))}</td>`;
          html += `<td>${fmt(metricGradeRank(ex, "总分"))}</td>`;

          for (const s of SUBJECTS) {
            html += `<td>${fmt(metricScore(ex, s))}</td>`;
            html += `<td>${fmt(metricClassRank(ex, s))}</td>`;
            html += `<td>${fmt(metricGradeRank(ex, s))}</td>`;
          }
          html += `</tr>`;
        }
        html += `</tbody>`;
        html += `</table>`;
        return html;
      }

      function buildExamSelect(results) {
        const sel = document.getElementById("examPick");
        sel.innerHTML = "";
        if (!results || !Array.isArray(results.exams) || results.exams.length === 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "无考试数据";
          sel.appendChild(opt);
          sel.disabled = true;
          return;
        }
        sel.disabled = false;
        for (const ex of results.exams) {
          const opt = document.createElement("option");
          opt.value = String(ex.exam_id);
          opt.textContent = `${ex.exam_date} · ${ex.exam_name}`;
          sel.appendChild(opt);
        }
        sel.value = String(results.exams[results.exams.length - 1].exam_id);
      }

      function chartCommon() {
        return {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "rgba(10,14,24,0.92)",
              borderColor: "rgba(255,255,255,0.14)",
              borderWidth: 1,
              titleColor: "rgba(0,0,0,0.9)",
              bodyColor: "rgba(255,255,255,0.84)",
              displayColors: false,
            },
            datalabels: {
              color: "rgba(0,0,0,0.86)",
              align: "top",
              anchor: "end",
              offset: 4,
              font: { weight: "700", size: 11 },
              formatter: (v) => (v === null || v === undefined ? "" : String(v)),
            },
          },
          scales: {
            x: {
              grid: { color: "rgba(0,0,0,0.05)" },
              ticks: { color: "rgba(0,0,0,0.72)", maxRotation: 0, autoSkip: true },
            },
            y: {
              grid: { color: "rgba(0,0,0,0.06)" },
              ticks: { color: "rgba(0,0,0,0.72)" },
            },
          },
        };
      }

      let trendChart = null;
      let singleChart = null;

      function renderTrend(results) {
        const metric = document.getElementById("trendMetric").value;
        if (!results || !Array.isArray(results.exams)) return;

        const labels = results.exams.map((x) => [x.exam_date || "", x.exam_name || ""]);
        const data = results.exams.map((x) => {
          const v = metricGradeRank(x, metric);
          return typeof v === "number" ? v : null;
        });

        const scale = computeRankScale(data.filter((x) => typeof x === "number"));
        setText("trendHint", `当前指标：${metric} · 段排`);

        const ctx = document.getElementById("trendChart");
        const cfg = {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data,
                borderColor: "rgba(110,231,255,0.85)",
                backgroundColor: "rgba(110,231,255,0.18)",
                pointBackgroundColor: "rgba(255,255,255,0.92)",
                pointBorderColor: "rgba(110,231,255,0.9)",
                pointBorderWidth: 2,
                pointRadius: 4.5,
                pointHoverRadius: 6.5,
                tension: 0.28,
                fill: true,
              },
            ],
          },
          options: {
            ...chartCommon(),
            scales: {
              ...chartCommon().scales,
              y: {
                ...chartCommon().scales.y,
                reverse: true,
                min: scale.min,
                max: scale.max,
                ticks: { ...chartCommon().scales.y.ticks, stepSize: scale.step },
              },
            },
          },
          plugins: [ChartDataLabels],
        };

        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, cfg);
      }

      function renderSingleExam(results) {
        const pick = document.getElementById("examPick").value;
        const ex = results && Array.isArray(results.exams) ? results.exams.find((x) => String(x.exam_id) === pick) : null;
        if (!ex) return;

        const labels = ["总分", ...SUBJECTS];
        const data = labels.map((m) => {
          const v = metricGradeRank(ex, m);
          return typeof v === "number" ? v : null;
        });

        const scale = computeRankScale(data.filter((x) => typeof x === "number"));

        const ctx = document.getElementById("singleChart");
        const cfg = {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data,
                borderColor: "rgba(255,208,138,0.8)",
                backgroundColor: "rgba(255,208,138,0.14)",
                pointBackgroundColor: "rgba(255,255,255,0.92)",
                pointBorderColor: "rgba(255,208,138,0.9)",
                pointBorderWidth: 2,
                pointRadius: 4.5,
                pointHoverRadius: 6.5,
                tension: 0.25,
                fill: true,
              },
            ],
          },
          options: {
            ...chartCommon(),
            scales: {
              ...chartCommon().scales,
              y: {
                ...chartCommon().scales.y,
                reverse: true,
                min: scale.min,
                max: scale.max,
                ticks: { ...chartCommon().scales.y.ticks, stepSize: scale.step },
              },
            },
          },
          plugins: [ChartDataLabels],
        };

        if (singleChart) singleChart.destroy();
        singleChart = new Chart(ctx, cfg);
      }

      let meta = null;
      let currentSeat = null;
      let currentResults = null;

      function normalize(s) {
        return String(s || "")
          .trim()
          .replace(/\s+/g, " ")
          .toLowerCase();
      }

      function openMenu() {
        document.getElementById("studentMenu").classList.add("show");
      }

      function closeMenu() {
        document.getElementById("studentMenu").classList.remove("show");
      }

      function renderMenu(filterText) {
        const menu = document.getElementById("studentMenu");
        const q = normalize(filterText);
        const items = (meta && meta.students ? meta.students : []).filter((s) => {
          if (!q) return true;
          const label = normalize(`${s.seat_no} ${s.name}`);
          return label.includes(q);
        });

        const top = items.slice(0, 18);
        menu.innerHTML = "";
        for (const s of top) {
          const div = document.createElement("div");
          div.className = "item";
          div.role = "option";
          div.innerHTML = `<div class="main">${s.seat_no} ${s.name}</div><div class="sub">选择</div>`;
          div.addEventListener("mousedown", (e) => {
            e.preventDefault();
            selectStudent(s.seat_no, s.name);
            closeMenu();
          });
          menu.appendChild(div);
        }

        if (!top.length) {
          const empty = document.createElement("div");
          empty.className = "item";
          empty.innerHTML = `<div class="main">未找到匹配学生</div><div class="sub">请检查输入</div>`;
          empty.addEventListener("mousedown", (e) => e.preventDefault());
          menu.appendChild(empty);
        }
      }

      function selectStudent(seatNo, name) {
        currentSeat = seatNo;
        const input = document.getElementById("studentInput");
        input.value = `${seatNo} ${name}`;
        setText("currentStudent", `当前：${seatNo} ${name}`);
        loadResults();
      }

      function parseSeatFromInput(v) {
        const m = String(v || "").trim().match(/^(\d+)/);
        if (!m) return null;
        const n = Number(m[1]);
        return Number.isFinite(n) ? n : null;
      }

      async function loadMeta() {
        const token = requireToken();
        setText("metaHint", "正在加载学生列表…");
        meta = await apiFetch("/meta", token);
        const count = meta && meta.students ? meta.students.length : 0;
        setText("metaHint", `学生数：${count} · 可输入座号或姓名筛选`);
        renderMenu("");
      }

      function renderLoadingTable() {
        const el = document.getElementById("tableWrap");
        el.innerHTML = `<div class="skeleton"><div class="pulse"></div></div>`;
      }

      async function loadResults() {
        if (!currentSeat) return;
        const token = requireToken();
        renderLoadingTable();
        setText("tableHint", "正在拉取成绩…");
        try {
          const data = await apiFetch(`/students/${currentSeat}/results`, token);
          currentResults = data;
          const el = document.getElementById("tableWrap");
          el.innerHTML = buildTable(data);
          setText("tableHint", `共 ${data.exams.length} 次考试`);
          buildExamSelect(data);
          renderTrend(data);
          renderSingleExam(data);
        } catch (e) {
          setText("tableHint", "");
          const el = document.getElementById("tableWrap");
          el.innerHTML = `<div class="muted">加载失败：${e && e.message ? e.message : "未知错误"}</div>`;
        }
      }

      function setupEvents() {
        buildMetricOptions();

        document.getElementById("trendMetric").addEventListener("change", () => {
          if (currentResults) renderTrend(currentResults);
        });

        document.getElementById("examPick").addEventListener("change", () => {
          if (currentResults) renderSingleExam(currentResults);
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
          eraseCookie(TOKEN_COOKIE);
          window.location.replace("/login.html");
        });

        const input = document.getElementById("studentInput");
        input.addEventListener("focus", () => {
          renderMenu(input.value);
          openMenu();
        });
        input.addEventListener("input", () => {
          renderMenu(input.value);
          openMenu();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            const seat = parseSeatFromInput(input.value);
            if (seat !== null && meta && meta.students) {
              const hit = meta.students.find((s) => Number(s.seat_no) === Number(seat));
              if (hit) selectStudent(hit.seat_no, hit.name);
              closeMenu();
            }
          }
          if (e.key === "Escape") {
            closeMenu();
          }
        });

        document.addEventListener("mousedown", (e) => {
          const menu = document.getElementById("studentMenu");
          const box = document.querySelector(".combo");
          if (!box.contains(e.target)) closeMenu();
        });
      }

      async function boot() {
        requireToken();
        setupEvents();
        await loadMeta();
      }

      boot();
    </script>
  </body>
</html>

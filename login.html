<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成绩分析站 · 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #070a12;
        --bg1: #0b1222;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.1);
        --line: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.62);
        --soft: rgba(255, 255, 255, 0.08);
        --brand: #6ee7ff;
        --brand2: #4ea0ff;
        --warn: #ffd08a;
        --danger: #ff6b7a;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 20% 10%, rgba(110, 231, 255, 0.16), transparent 60%),
          radial-gradient(900px 540px at 86% 12%, rgba(78, 160, 255, 0.16), transparent 55%),
          radial-gradient(1100px 720px at 60% 100%, rgba(255, 208, 138, 0.08), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -40px;
        background: repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.03) 0px,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 9px
        );
        opacity: 0.4;
        pointer-events: none;
        filter: blur(0.2px);
      }

      .shell {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .card {
        width: min(520px, 100%);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.05));
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        overflow: hidden;
        transform: translateY(12px);
        opacity: 0;
        animation: in 760ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      @keyframes in {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .head {
        padding: 22px 22px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        font-family: "ZCOOL XiaoWei", serif;
        font-weight: 400;
        margin: 0;
        letter-spacing: 0.6px;
        font-size: 22px;
        line-height: 1.1;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .chip {
        padding: 8px 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.78);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .content {
        padding: 20px 22px 22px;
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.78);
      }

      input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.22);
        color: var(--text);
        padding: 12px 12px;
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      input:focus {
        border-color: rgba(110, 231, 255, 0.5);
        box-shadow: 0 0 0 4px rgba(110, 231, 255, 0.12);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      .btn {
        border: 1px solid rgba(110, 231, 255, 0.28);
        background: radial-gradient(180px 120px at 20% 20%, rgba(110, 231, 255, 0.32), transparent 60%),
          linear-gradient(180deg, rgba(110, 231, 255, 0.18), rgba(78, 160, 255, 0.12));
        color: rgba(255, 255, 255, 0.92);
        padding: 12px 14px;
        border-radius: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, filter 160ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(110, 231, 255, 0.52);
        box-shadow: 0 12px 40px rgba(78, 160, 255, 0.14);
        filter: saturate(1.06);
      }

      .btn:active {
        transform: translateY(0px);
      }

      .btn[disabled] {
        cursor: not-allowed;
        opacity: 0.7;
        filter: grayscale(0.15);
      }

      .hint {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .error {
        display: none;
        border-radius: 14px;
        border: 1px solid rgba(255, 107, 122, 0.35);
        background: rgba(255, 107, 122, 0.1);
        padding: 10px 12px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
      }

      .error.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card" role="main" aria-label="登录">
        <div class="head">
          <div class="brand">
            <h1>成绩分析站</h1>
            <p>登录后可查询学生历次成绩与段排名趋势</p>
          </div>
          <div class="chip">127.0.0.1:12345</div>
        </div>
        <form class="content" id="loginForm">
          <div class="error" id="errorBox"></div>
          <label>
            账号
            <input id="username" autocomplete="username" placeholder="请输入账号" />
          </label>
          <label>
            密码
            <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </label>
          <div class="row">
            <button class="btn" id="submitBtn" type="submit">登录并进入查询</button>
          </div>
          <div class="hint" style="display:none;">
            <span>仅在未保存 token 时可登录</span>
            <span id="tokenState"></span>
          </div>
        </form>
      </div>
    </div>

    <script>
      const BASE_URL = "";
      const TOKEN_COOKIE = "token";

      function getCookie(name) {
        const parts = document.cookie.split(";").map((x) => x.trim());
        for (const part of parts) {
          if (!part) continue;
          const idx = part.indexOf("=");
          if (idx < 0) continue;
          const k = decodeURIComponent(part.slice(0, idx));
          if (k !== name) continue;
          return decodeURIComponent(part.slice(idx + 1));
        }
        return "";
      }

      function setCookie(name, value, maxAgeSeconds) {
        const maxAge = typeof maxAgeSeconds === "number" ? `; Max-Age=${maxAgeSeconds}` : "";
        document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}${maxAge}; Path=/; SameSite=Lax`;
      }

      function eraseCookie(name) {
        document.cookie = `${encodeURIComponent(name)}=; Max-Age=0; Path=/; SameSite=Lax`;
      }

      function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg || "";
        box.classList.toggle("show", Boolean(msg));
      }

      function redirectToQuery() {
        window.location.replace("/home.html");
      }

      function boot() {
        const token = getCookie(TOKEN_COOKIE);
        const state = document.getElementById("tokenState");
        if (token) {
          state.textContent = "已检测到 token，正在跳转…";
          redirectToQuery();
          return;
        }
        state.textContent = "未检测到 token";
      }

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const token = getCookie(TOKEN_COOKIE);
        if (token) {
          redirectToQuery();
          return;
        }

        showError("");
        const btn = document.getElementById("submitBtn");
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
          showError("请输入账号与密码");
          return;
        }

        btn.disabled = true;
        try {
          const res = await fetch(`${BASE_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          if (!res.ok) {
            const detail = await res.json().catch(() => null);
            throw new Error(detail && detail.detail ? String(detail.detail) : `登录失败（${res.status}）`);
          }
          const data = await res.json();
          if (!data || !data.token) {
            throw new Error("登录响应不包含 token");
          }
          setCookie(TOKEN_COOKIE, data.token, 3600 * 24 * 365);
          redirectToQuery();
        } catch (err) {
          eraseCookie(TOKEN_COOKIE);
          showError(err && err.message ? err.message : "登录失败");
        } finally {
          btn.disabled = false;
        }
      });

      boot();
    </script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#66B1FF"/>
            <stop offset="100%" stop-color="#409EFF"/>
        </linearGradient>
    </defs>

    <!-- 圆形背景 -->
    <circle cx="128" cy="128" r="112" fill="url(#bg)"/>

    <!-- 折线 -->
    <polyline
        points="62,156 96,126 126,146 170,92 194,108"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- 节点 -->
    <circle cx="62" cy="156" r="7" fill="#FFFFFF"/>
    <circle cx="96" cy="126" r="7" fill="#FFFFFF"/>
    <circle cx="126" cy="146" r="7" fill="#FFFFFF"/>
    <circle cx="170" cy="92" r="7" fill="#FFFFFF"/>
    <circle cx="194" cy="108" r="7" fill="#FFFFFF"/>
</svg>